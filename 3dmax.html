<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>3d max</title>
<style>.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    background: linear-gradient(45deg, #38bdf8, #6366f1);
    color: white;
    text-decoration: none;
    display: inline-block;}

    .gallery {
    column-count: 3; 
    column-gap: 20px;
}

.gallery img {
    width: 100%;
    margin-bottom: 20px; 

    border-radius: 15px;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);

    display: block; 
    break-inside: avoid;
}

.gallery img:hover {
    transform: scale(1.05);
}
    </style>

</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; text-align:center; padding:50px;">
